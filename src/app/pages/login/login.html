<div class="login-container">
    <div class="login-card">
        <h2>Biblioteca Universitaria</h2>
        <p>Ingresa tus credenciales para continuar</p>

        <form (ngSubmit)="onLogin()">

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" [(ngModel)]="credenciales.email" required
                    placeholder="ejemplo@universidad.edu">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" [(ngModel)]="credenciales.password" required
                    placeholder="********">
            </div>

            <div class="error-message" *ngIf="errorMessage" role="alert" aria-live="polite">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="register-link">
            <p>¿Eres nuevo? <a (click)="irARegistro()">Regístrate aquí</a></p>
        </div>
    </div>
</div>
